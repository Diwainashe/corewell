<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Become a Stockist – CoreWell</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="header"></div>
<main>
  <div class="page-banner">
    <p class="eyebrow light center">Partner With Us</p>
    <h1>Stock <em>CoreWell</em></h1>
    <p>Bring Africa's fastest-growing wellness shots to your store, gym or spa.</p>
  </div>
  <section class="stockist">
    <div class="reveal">
      <p>We'd love to partner with you. Fill in the form below and our team will be in touch within 48 hours.</p>
      <div class="stockist-buttons">
        <a href="#partner-form" class="btn-p">Become a Stockist</a>
        <a href="#partner-form" class="btn-o">Partner With Us</a>
      </div>
    </div>
    <div id="partner-form" class="stockist-form reveal" style="transition-delay:.1s;">
      <h3>Tell Us About Your Business</h3>
      <form id="stockist-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" required placeholder="Your name"/>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com"/>
        </div>
        <div class="form-group">
          <label for="company">Company / Store Name</label>
          <input type="text" id="company" name="company" placeholder="Your business name"/>
        </div>
        <div class="form-group">
          <label for="message">Tell us about your business</label>
          <textarea id="message" name="message" rows="5" required placeholder="Describe your store, location, and why you'd like to stock CoreWell..."></textarea>
        </div>
        <button type="submit" class="btn-form">Submit Enquiry</button>
      </form>
    </div>
  </section>
</main>
<div id="footer"></div>
<div id="toast"></div>
<script type="module" src="js/components.js"></script>
<script type="module" src="js/app.js"></script>
<script type="module" src="js/stockist.js"></script>
</body>
</html>
