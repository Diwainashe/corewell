<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – CoreWell</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="header"></div>
<main class="auth-page">
  <div class="auth-wrap reveal">
    <div class="auth-logo">Core<span>Well</span></div>
    <h2>Welcome Back</h2>
    <p class="auth-sub">Sign in to your account</p>
    <form id="login-form">
      <div class="form-group">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" required placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" required placeholder="••••••••"/>
      </div>
      <button type="submit" class="btn-form">Sign In</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="register.html">Create one</a></p>
  </div>
</main>
<div id="footer"></div>
<div id="toast"></div>
<script type="module" src="js/components.js"></script>
<script type="module" src="js/app.js"></script>
<script type="module" src="js/auth.js"></script>
</body>
</html>
