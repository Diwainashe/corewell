<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Cart – CoreWell</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="header"></div>
<main style="padding-top:68px;">
  <div class="cart-page reveal">
    <h2>Your Cart</h2>
    <div id="cart-items"></div>
    <div id="empty-message" style="display:none;">
      <p>Your cart is empty.</p>
      <a href="shop.html" class="btn-p" style="margin-top:20px;display:inline-flex;">Shop Now</a>
    </div>
    <div class="cart-summary" id="cart-summary" style="display:none;">
      <p class="total">Total: R<span id="cart-total">0.00</span></p>
      <button id="checkout-btn" class="btn-gold">Proceed to Checkout</button>
    </div>
  </div>
</main>
<div id="footer"></div>
<div id="toast"></div>
<script type="module" src="js/components.js"></script>
<script type="module" src="js/app.js"></script>
<script type="module" src="js/cart.js"></script>
<script type="module" src="js/cartPage.js"></script>
</body>
</html>
