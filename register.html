<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – CoreWell</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="header"></div>
<main class="auth-page">
  <div class="auth-wrap reveal">
    <div class="auth-logo">Core<span>Well</span></div>
    <h2>Create Account</h2>
    <p class="auth-sub">Start your glow journey today</p>
    <form id="register-form">
      <div class="form-group">
        <label for="reg-name">Full Name</label>
        <input type="text" id="reg-name" required placeholder="Your name"/>
      </div>
      <div class="form-group">
        <label for="reg-email">Email Address</label>
        <input type="email" id="reg-email" required placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" required placeholder="Min. 6 characters"/>
      </div>
      <div class="form-group">
        <label for="reg-confirm">Confirm Password</label>
        <input type="password" id="reg-confirm" required placeholder="Repeat password"/>
      </div>
      <button type="submit" class="btn-form">Create Account</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
</main>
<div id="footer"></div>
<div id="toast"></div>
<script type="module" src="js/components.js"></script>
<script type="module" src="js/app.js"></script>
<script type="module" src="js/auth.js"></script>
</body>
</html>
