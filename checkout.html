<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout – CoreWell</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="header"></div>
<main style="padding-top:68px;">
  <div class="checkout-page reveal">
    <h2>Checkout</h2>
    <div class="checkout-grid">
      <div class="order-summary">
        <h3>Your Order</h3>
        <div id="order-items"></div>
        <p class="cart-total">Total: R<span id="order-total">0.00</span></p>
      </div>
      <div class="checkout-form-wrap">
        <h3>Shipping Details</h3>
        <form id="checkout-form">
          <div class="form-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" required placeholder="Your full name"/>
          </div>
          <div class="form-group">
            <label for="address">Delivery Address</label>
            <textarea id="address" rows="3" required placeholder="Street, City, Province, Postal Code"></textarea>
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" required placeholder="+27 xx xxx xxxx"/>
          </div>
          <div class="form-group">
            <label for="checkout-email">Email Address</label>
            <input type="email" id="checkout-email" required placeholder="your@email.com"/>
          </div>
          <button type="submit" class="btn-form">Pay Securely with PayFast</button>
          <p class="checkout-note">🔒 You will be redirected to PayFast to complete your purchase securely. Your card details never touch our servers.</p>
        </form>
      </div>
    </div>
  </div>
</main>
<div id="footer"></div>
<div id="toast"></div>
<script type="module" src="js/components.js"></script>
<script type="module" src="js/app.js"></script>
<script type="module" src="js/checkoutPage.js"></script>
</body>
</html>
